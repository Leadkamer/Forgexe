<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" width="1050" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0a0b0e"/>
      <stop offset="100%" stop-color="#1a0f0a"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="30%" stop-color="#34d399" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#00f0ff" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#f5a623" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1050" height="600" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#34d399" stroke-width="0.5" fill="none">
    <line x1="0" y1="100" x2="1050" y2="100"/>
    <line x1="0" y1="200" x2="1050" y2="200"/>
    <line x1="0" y1="300" x2="1050" y2="300"/>
    <line x1="0" y1="400" x2="1050" y2="400"/>
    <line x1="0" y1="500" x2="1050" y2="500"/>
    <line x1="175" y1="0" x2="175" y2="600"/>
    <line x1="350" y1="0" x2="350" y2="600"/>
    <line x1="525" y1="0" x2="525" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
    <line x1="875" y1="0" x2="875" y2="600"/>
  </g>

  <!-- Neon line bottom -->
  <rect x="60" y="540" width="930" height="1.5" fill="url(#line)"/>

  <!-- Orbit visual (right side, subtle) -->
  <g transform="translate(800, 300)" opacity="0.15">
    <circle cx="0" cy="0" r="80" stroke="url(#orbitGrad)" stroke-width="1" fill="none"/>
    <circle cx="0" cy="0" r="140" stroke="url(#orbitGrad)" stroke-width="0.7" fill="none"/>
    <circle cx="0" cy="0" r="200" stroke="url(#orbitGrad)" stroke-width="0.5" fill="none"/>
    <circle cx="0" cy="0" r="110" stroke="#34d399" stroke-width="0.6" fill="none" stroke-dasharray="5 12"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(80, 180)">
    <rect x="0" y="0" width="18" height="90" rx="3" fill="#34d399"/>
    <rect x="0" y="0" width="65" height="16" rx="3" fill="#34d399"/>
    <rect x="0" y="36" width="48" height="13" rx="3" fill="#34d399"/>
    <polygon points="56,34 84,52 56,70" fill="#34d399"/>
  </g>

  <!-- FORGEXE text -->
  <text x="185" y="250" font-family="'Outfit', 'Arial', sans-serif" font-size="52" font-weight="700" letter-spacing="6" fill="#34d399">FORGEXE</text>

  <!-- Terminal tagline -->
  <text x="82" y="310" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="500" letter-spacing="1.5" fill="#e2e8f0">C:\&gt; execute growth</text>
  <rect x="322" y="295" width="8" height="17" rx="1.5" fill="#34d399" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="82" y="360" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="14" font-weight="400" fill="#8d9bb5">AI-medewerkers die jouw groei en operatie</text>
  <text x="82" y="385" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="14" font-weight="400" fill="#8d9bb5">24/7 uitvoeren.</text>

  <!-- Website -->
  <text x="82" y="500" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="600" fill="#34d399">forgexe.nl</text>
</svg>
